services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: skillxchange
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: skillxchange
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-second-db.sql:/docker-entrypoint-initdb.d/02-chat-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillxchange -d skillxchange"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  user-service:
    build:
      context: ../..
      dockerfile: deploy/aws/Dockerfile.user-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://skillxchange:${POSTGRES_PASSWORD}@postgres:5432/skillxchange?schema=public
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CACHE_TTL: ${CACHE_TTL:-86400}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      FRONTEND_URL: ${FRONTEND_URL:?set FRONTEND_URL in .env}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}

  communication-service:
    build:
      context: ../..
      dockerfile: deploy/aws/Dockerfile.communication-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: "8080"
      DATABASE_URL: postgresql://skillxchange:${POSTGRES_PASSWORD}@postgres:5432/skillxchange_chat?schema=public
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CACHE_TTL: ${CACHE_TTL:-86400}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - user-service
      - communication-service
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

volumes:
  postgres_data:
  redis_data:
